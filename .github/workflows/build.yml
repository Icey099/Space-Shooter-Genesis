name: Build Windows EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pygame pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --icon="Assets/Images/game_icon.ico" --name "Space Shooter Genesis" space_shooter_genesis.py

      - name: Prepare Release Folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "Space-Shooter-Genesis-v1.0"
          Copy-Item "dist/Space Shooter Genesis.exe" "Space-Shooter-Genesis-v1.0/"
          Copy-Item README.md "Space-Shooter-Genesis-v1.0/"
          Copy-Item Assets "Space-Shooter-Genesis-v1.0/" -Recurse

      - name: Upload Game Package
        uses: actions/upload-artifact@v4
        with:
          name: Space-Shooter-Genesis-v1.0
          path: Space-Shooter-Genesis-v1.0
